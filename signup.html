<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | MOATA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="intake-page">
    <header class="site-header">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/moata-logo.svg" alt="" /><span><strong>MOATA</strong><small>Management of Automated Tasks</small></span></a>
      <nav class="main-nav"><a href="services.html">Platform</a><a href="pricing.html">Pricing</a><a href="lazoya-example.html">Use Case</a><a href="process.html">Process</a></nav>
      <div class="header-actions"></div>
    </header>
    <main class="auth-main">
      <section class="auth-card minimalist-auth-card">
        <p class="eyebrow">Create account</p>
        <h1>Create your account.</h1>
        <p>Save your assistant and open your dashboard.</p>
        <button class="google-auth-button" type="button" id="googleAuthButton">Continue with Google</button>
        <p class="auth-divider">or use email</p>
        <form id="authForm" data-auth-mode="signup">
          <label>Name <input name="name" /></label>
          <label>Email <input type="email" name="email" required /></label>
          <label>Password <input type="password" name="password" minlength="6" required /></label>
          <button class="button" type="submit">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="login.html">Login</a></p>
        <p class="form-note" id="authNote" aria-live="polite"></p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
